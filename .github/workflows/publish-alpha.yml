# Publish Docker images to GHCR when merging to alpha (Plan 13).
# Version: base from package.json + auto-increment alpha.N from GHCR, or version_override on manual run.

name: Publish Alpha

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      version_override:
        description: "Optional version override (default: auto-increment from GHCR)"
        required: false
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Verify parcel watcher runtime (platform preflight)
        run: |
          echo "platform=$(node -p process.platform) arch=$(node -p process.arch)"
          if ! node -e "require('@parcel/watcher')" 2>/dev/null; then
            echo "watcher native binary missing, attempting Linux fallback..."
            WATCHER_VERSION=$(node -p "require('./node_modules/@parcel/watcher/package.json').version")
            echo "Installing @parcel/watcher-linux-x64-glibc@${WATCHER_VERSION}"
            npm install --no-save "@parcel/watcher-linux-x64-glibc@${WATCHER_VERSION}"
          fi
          node -e "require('@parcel/watcher'); console.log('watcher runtime check ok');"

      - name: Verify @next/swc native binding (platform preflight)
        run: |
          echo "platform=$(node -p process.platform) arch=$(node -p process.arch)"
          if ! node - <<'NODE'
          try {
            require('@next/swc-linux-x64-gnu');
            console.log('@next/swc-linux-x64-gnu load check ok');
          } catch (error) {
            console.error('@next/swc-linux-x64-gnu load check failed');
            if (Array.isArray(error?.cause)) {
              for (const entry of error.cause) {
                console.error(`cause: ${entry}`);
              }
            } else if (error?.cause) {
              console.error(`cause: ${error.cause}`);
            }
            process.exit(1);
          }
          NODE
          then
            echo '@next/swc-linux-x64-gnu missing, attempting fallback install...'
            NEXT_VERSION=$(node -p "require('./node_modules/next/package.json').version")
            echo "Installing @next/swc-linux-x64-gnu@${NEXT_VERSION}"
            npm install --no-save "@next/swc-linux-x64-gnu@${NEXT_VERSION}"
          fi
          node -e "require('@next/swc-linux-x64-gnu'); console.log('@next/swc runtime check ok');"

      - name: Verify next-intl @swc/core native binding (platform preflight)
        run: |
          echo "platform=$(node -p process.platform) arch=$(node -p process.arch)"
          if ! node - <<'NODE'
          const path = require('node:path');
          try {
            const nextIntlPkgPath = require.resolve('next-intl/package.json');
            const nextIntlDir = path.dirname(nextIntlPkgPath);
            const swcCorePkgPath = require.resolve('@swc/core/package.json', { paths: [nextIntlDir] });
            const swcCoreDir = path.dirname(swcCorePkgPath);
            require(swcCoreDir);
            console.log(`next-intl @swc/core load check ok (${swcCoreDir})`);
          } catch (error) {
            console.error('next-intl @swc/core load check failed');
            if (Array.isArray(error?.cause)) {
              for (const entry of error.cause) {
                console.error(`cause: ${entry}`);
              }
            } else if (error?.cause) {
              console.error(`cause: ${error.cause}`);
            }
            process.exit(1);
          }
          NODE
          then
            echo '@swc/core Linux native binding missing, attempting fallback install...'
            SWC_CORE_VERSION=$(node - <<'NODE'
          const path = require('node:path');
          const nextIntlPkgPath = require.resolve('next-intl/package.json');
          const nextIntlDir = path.dirname(nextIntlPkgPath);
          const swcCorePkgPath = require.resolve('@swc/core/package.json', { paths: [nextIntlDir] });
          process.stdout.write(require(swcCorePkgPath).version);
          NODE
            )
            echo "Installing @swc/core-linux-x64-gnu@${SWC_CORE_VERSION}"
            npm install --no-save "@swc/core-linux-x64-gnu@${SWC_CORE_VERSION}"
          fi
          node - <<'NODE'
          const path = require('node:path');
          const nextIntlPkgPath = require.resolve('next-intl/package.json');
          const nextIntlDir = path.dirname(nextIntlPkgPath);
          const swcCorePkgPath = require.resolve('@swc/core/package.json', { paths: [nextIntlDir] });
          const swcCoreDir = path.dirname(swcCorePkgPath);
          require(swcCoreDir);
          console.log(`next-intl @swc/core runtime check ok (${swcCoreDir})`);
          NODE

      - name: Security audit
        run: npm audit --omit=dev

      - name: Build packages
        run: npm run build:packages

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Setup web env for build
        run: cp apps/web/.env.example apps/web/.env.local

      - name: Pre-build native sanity check
        run: |
          node - <<'NODE'
          const path = require('node:path');
          const checks = [
            { name: '@parcel/watcher', load: () => require('@parcel/watcher') },
            { name: '@next/swc-linux-x64-gnu', load: () => require('@next/swc-linux-x64-gnu') },
            {
              name: 'next-intl @swc/core',
              load: () => {
                const nextIntlPkgPath = require.resolve('next-intl/package.json');
                const nextIntlDir = path.dirname(nextIntlPkgPath);
                const swcCorePkgPath = require.resolve('@swc/core/package.json', { paths: [nextIntlDir] });
                const swcCoreDir = path.dirname(swcCorePkgPath);
                return require(swcCoreDir);
              },
            },
          ];
          let hasFailure = false;
          for (const check of checks) {
            try {
              check.load();
              console.log(`native check ok: ${check.name}`);
            } catch (error) {
              hasFailure = true;
              console.error(`native check failed: ${check.name}`);
              if (Array.isArray(error?.cause)) {
                for (const entry of error.cause) {
                  console.error(`cause: ${entry}`);
                }
              } else if (error?.cause) {
                console.error(`cause: ${error.cause}`);
              }
            }
          }
          if (hasFailure) {
            process.exit(1);
          }
          NODE

      - name: Build apps
        run: npm run build:apps

      - name: Calculate unified version
        id: version
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            echo "Using version override: ${{ inputs.version_override }}"
            echo "VERSION=${{ inputs.version_override }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          BASE_VERSION=$(node -p "require('./package.json').version" | sed 's/-.*//')
          IMAGE_PATH="${{ github.repository }}/api"
          echo "Base version: $BASE_VERSION"
          echo "Reference image path: $IMAGE_PATH"

          TAGS_JSON=$(curl -s -H "Authorization: Bearer $GHCR_TOKEN" \
            "https://ghcr.io/v2/${IMAGE_PATH}/tags/list" || echo '{"tags":[]}')
          TAGS=$(echo "$TAGS_JSON" | jq -r '.tags[]?' 2>/dev/null | grep "^${BASE_VERSION}-alpha\." || true)

          if [ -z "$TAGS" ]; then
            echo "No existing alpha tags for ${BASE_VERSION}. Starting at alpha.0"
            NEXT_VERSION="${BASE_VERSION}-alpha.0"
          else
            LATEST=$(echo "$TAGS" | sort -t. -k4 -n | tail -n1)
            CURRENT_NUM=$(echo "$LATEST" | sed -En 's/.*alpha\.([0-9]+)$/\1/p')
            if [ -z "$CURRENT_NUM" ]; then
              NEXT_VERSION="${BASE_VERSION}-alpha.0"
            else
              NEXT_NUM=$((CURRENT_NUM + 1))
              NEXT_VERSION="${BASE_VERSION}-alpha.${NEXT_NUM}"
            fi
            echo "Latest existing: $LATEST, next: $NEXT_VERSION"
          fi

          echo "VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT

  publish-docker:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: infra/docker/local/api/Dockerfile
          - app: web
            dockerfile: infra/docker/local/web/Dockerfile
          - app: web-sidecar
            dockerfile: infra/docker/local/web-sidecar/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ needs.validate.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:alpha
          cache-from: type=gha
          cache-to: type=gha,mode=max
