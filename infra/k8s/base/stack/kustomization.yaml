apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: boilerplate-local

resources:
  - namespace.yaml
  - pvc.yaml
  - workloads.yaml
  - services.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: boilerplate-postgres-init
    files:
      # Filenames sort lexicographically in docker-entrypoint-initdb.d/: app roles, management DB+roles, schemas, management grants.
      - postgres-init/create_app_db_users.sh
      - postgres-init/setup_management_database.sh
      - postgres-init/z_load_app_schema.sql
      - postgres-init/z_load_management_schema.sql
      - postgres-init/zz_management_grants.sh
