---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-sidecar
  namespace: boilerplate-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-sidecar
  template:
    metadata:
      labels:
        app: web-sidecar
    spec:
      containers:
        - name: web-sidecar
          image: boilerplate-local-web-sidecar:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          envFrom:
            - secretRef:
                name: boilerplate-web-sidecar-env
          env:
            - name: API_BACKEND_URL
              value: http://api:4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: boilerplate-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: wait-web-sidecar
          image: alpine:3.19
          command:
            - sh
            - -c
            - until wget -q -O /dev/null http://web-sidecar:4001/; do echo waiting for web-sidecar; sleep 2; done; echo web-sidecar ready
      containers:
        - name: web
          image: boilerplate-local-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          envFrom:
            - secretRef:
                name: boilerplate-web-env
          env:
            - name: RUNTIME_CONFIG_URL
              value: http://web-sidecar:4001
            - name: API_BACKEND_URL
              value: http://api:4000
          readinessProbe:
            tcpSocket:
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 10
---
