apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: boilerplate-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.1
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: boilerplate-db-env
          env:
            - name: MANAGEMENT_DB_NAME
              value: boilerplate_management
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${POSTGRES_USER:-postgres}"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "${POSTGRES_USER:-postgres}"
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: boilerplate-postgres-data
        - name: postgres-init
          configMap:
            name: boilerplate-postgres-init
            defaultMode: 0755
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: boilerplate-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:7-alpine
          command:
            - /bin/sh
            - -c
            - exec valkey-server --requirepass "$VALKEY_PASSWORD"
          envFrom:
            - secretRef:
                name: boilerplate-valkey-env
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: valkey-data
              mountPath: /data
      volumes:
        - name: valkey-data
          persistentVolumeClaim:
            claimName: boilerplate-valkey-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: boilerplate-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done; echo postgres ready
        - name: wait-valkey
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z valkey 6379; do echo waiting for valkey; sleep 2; done; echo valkey ready
      containers:
        - name: api
          image: boilerplate-local-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: boilerplate-api-env
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: VALKEY_HOST
              value: valkey
            - name: VALKEY_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
---
