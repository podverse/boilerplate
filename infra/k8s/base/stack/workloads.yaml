metadata:
  name: management-api
  namespace: boilerplate-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-api
  template:
    metadata:
      labels:
        app: management-api
    spec:
      containers:
        - name: management-api
          image: boilerplate-local-management-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4100
          envFrom:
