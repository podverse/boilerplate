apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: boilerplate-db-postgres-init
    files:
      # Mirrors base/stack/postgres-init; Kustomize load restrictor requires files under this dir — keep in sync via make sync_k8s_postgres_init / combine-migrations.sh.
      - postgres-init/create_app_db_users.sh
      - postgres-init/setup_management_database.sh
      - postgres-init/z_load_app_schema.sql
      - postgres-init/z_load_management_schema.sql
      - postgres-init/zz_management_grants.sh

resources:
  - pvc-postgres.yaml
  - service-postgres.yaml
  - deployment-postgres.yaml
